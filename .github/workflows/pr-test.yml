name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - dev
      - main
      - 'release/**'

env:
  BUILD_TYPE: test

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Get changed files
        id: changed-files
        run: |
          # Get the list of changed C/C++ files in the PR
          git fetch origin ${{ github.base_ref }}
          CHANGED_FILES=$(git diff --name-only --diff-filter=ACM origin/${{ github.base_ref }}...HEAD | grep -E '\.(cpp|hpp|h|c|cc|cxx)$' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run clang-format
        if: steps.changed-files.outputs.files != ''
        run: |
          FILES="${{ steps.changed-files.outputs.files }}"
          if [ -n "$FILES" ]; then
            echo "Formatting files:"
            echo "$FILES"
            echo "$FILES" | xargs -r clang-format -i --style=file --fallback-style=LLVM
          fi

      - name: Commit formatted changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          if git diff --quiet; then
            echo "No formatting changes needed"
          else
            git add -A
            git commit -m "refactor: Apply clang-format to PR files [skip ci]"
            git push
          fi

  changes:
    needs: format
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      cpp: ${{ steps.filter.outputs.cpp }}
      workflow: ${{ steps.filter.outputs.workflow }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cpp:
              - 'src/**'
              - 'tests/**'
              - 'CMakeLists.txt'
              - 'cmake/**'
              - 'shaders/**'
            workflow:
              - '.github/workflows/pr-test.yml'

  test:
    needs: [format, changes]
    if: always() && needs.changes.outputs.cpp == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux jobs
          - os: ubuntu-latest
            compiler: gcc
            preset: gcc-test
            cc: gcc
            cxx: g++
          - os: ubuntu-latest
            compiler: clang
            preset: clang-test
            cc: clang
            cxx: clang++
          # Windows jobs
          - os: windows-latest
            compiler: msvc
            preset: msvc-test
          - os: windows-latest
            compiler: clang
            preset: clang-test

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.compiler }} cmake ninja-build \
            libwayland-dev libxkbcommon-dev xorg-dev

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: cmake --preset ${{ matrix.preset }}
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Run tests
        run: ctest --preset ${{ matrix.preset }} --output-on-failure
